<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="小桑前端作品集 - 175+ 个前端项目展示">
    <meta name="keywords" content="前端, JavaScript, TypeScript, React, Vue, 创意编程, Portfolio">
    <title>小桑前端作品集 | Xiaosang Frontend Portfolio</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <img src="head.png" alt="Logo" class="logo-img">
                    <div class="logo-text">
                        <h1 id="site-title">小桑前端作品集</h1>
                        <p id="site-subtitle">A frontend dev with enough 'weird ideas'</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button class="lang-toggle" id="lang-toggle" title="Switch Language">
                        <span class="lang-icon">🌐</span>
                        <span class="lang-text">EN</span>
                    </button>
                    <div class="stats">
                        <span class="stat-item">
                            <span class="stat-number" id="repo-count">175</span>
                            <span class="stat-label" data-zh="个项目" data-en="repos">个项目</span>
                        </span>
                        <span class="stat-item">
                            <span class="stat-number">2231</span>
                            <span class="stat-label">⭐ gushi_namer</span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Search and Filter -->
    <section class="filter-section">
        <div class="container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input"
                       data-zh-placeholder="搜索项目名称、描述、技术栈..."
                       data-en-placeholder="Search by name, description, language..."
                       placeholder="搜索项目名称、描述、技术栈...">
                <button class="search-clear" id="search-clear" title="Clear">✕</button>
            </div>
            <div class="filter-tags" id="filter-tags">
                <button class="tag-btn active" data-category="all">
                    <span data-zh="全部" data-en="All">全部</span>
                    <span class="tag-count" id="count-all">0</span>
                </button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="categories-grid" id="categories-grid">
                <!-- Categories will be loaded dynamically -->
            </div>
            <div class="no-results" id="no-results" style="display: none;">
                <p data-zh="没有找到匹配的项目" data-en="No matching projects found">没有找到匹配的项目</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="https://github.com/holynova" target="_blank" rel="noopener">
                        <span class="footer-icon">📦</span>
                        <span data-zh="GitHub" data-en="GitHub">GitHub</span>
                    </a>
                    <a href="mailto:holy_nova@126.com">
                        <span class="footer-icon">📧</span>
                        <span data-zh="联系我" data-en="Contact">联系我</span>
                    </a>
                </div>
                <div class="footer-info">
                    <p data-zh="用 ❤️ 和 JavaScript 构建" data-en="Built with ❤️ and JavaScript">用 ❤️ 和 JavaScript 构建</p>
                    <p class="footer-update" id="last-update"></p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Back to Top -->
    <button class="back-to-top" id="back-to-top" title="Back to Top">↑</button>

    <script src="js/main.js"></script>
</body>
</html>
